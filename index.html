<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>deCampoACampo - TOP Sociedades</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./styles.css">
</head>

<body>

    <div id="login-view">
        <div class="login-card">
            <div class="brand">
                <div class="brand-name">de<span>Campo</span>a<span>Campo</span></div>
                <div class="brand-sub">Mercado Ganadero</div>
                <div class="divider"></div>
            </div>
            <form id="loginForm">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="inp-email" placeholder="usuario@empresa.com" required>
                </div>
                <div class="form-group">
                    <label>Contraseña</label>
                    <input type="password" id="inp-pass" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-login" id="btnLogin">Iniciar Sesión</button>
            </form>
            <div class="login-error" id="loginErr"></div>
        </div>
    </div>

    <div id="dash-view">
        <div class="topbar">
            <div class="topbar-left">
                <div class="icon">📊</div>
                <h1>TOP Sociedades</h1>
            </div>
            <div class="topbar-center">de<span>Campo</span>a<span>Campo</span></div>
            <div class="topbar-right">
                <div id="adminControls" class="ac-selector">
                    <div class="ac-dropdown">
                        <input type="text" id="acInput" placeholder="Seleccionar Comercial..." autocomplete="off">
                        <div id="acResults" class="ac-results"></div>
                    </div>
                </div>
                <div class="user-chip">
                    <div class="avatar" id="userAvatar">U</div>
                    <span id="userName">Usuario</span>
                </div>
                <button class="btn-logout" id="btnLogout">Salir</button>
            </div>
        </div>

        <div class="container">
            <div class="search-bar">
                <input type="text" id="searchInput" placeholder="🔍  Buscar por razón social, representante, AC...">
            </div>

            <div class="table-card">
                <div class="table-title">
                    <div style="display:flex;align-items:center;gap:12px">
                        <span class="count" id="rowCount"
                            style="font-size: 11px; color: #64748b; font-weight: 500;"></span>
                        <div class="spinner" id="spinner"></div>
                    </div>
                </div>
                <div class="table-wrap">
                    <table>
                        <thead>
                            <tr id="tHead"></tr>
                        </thead>
                        <tbody id="tBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="./main.js"></script>
</body>

</html>
